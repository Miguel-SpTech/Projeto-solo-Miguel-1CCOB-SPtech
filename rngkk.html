<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="rng()">
        let's go gambling
    </button>
    <button onclick="shinyRGB()">Shiny nos Jogos da 1 até a 5</button>
    <button onclick="zerarContador()">Zerar</button>
    <div id="divkk"></div>
</body>
</html>
<script>
    let contador = 0;
    function rng() {
        let numRandom = Math.random();//o random só gera número entre 0 e 1 por si só
        let numRandom10 = Math.random() * 10;// agora multiplicando ele agora gera números entre 0 e 10
        let numRandom10to20 = Math.random() * (20-10) + 10; // nesse caso usamos a formula Math.random() * (max - min) + min
        let numRandom10to20pt2 = Math.random() * (20 - 10 + 1) + 10 // aqui é para quando voce não usa o toFixed para arredondar
        divkk.innerHTML = `${numRandom10.toFixed(0)}`;
        console.log(numRandom10);
    }
    function zerarContador(){
        divkk.innerHTML = "";
        contador = 0
    }
    function shinyHunt(max,min) {
        let shinyChance = Math.random() * (max - min + 1) + min;
        return shinyChance;
    }
    function shinyRGB() {
        
        let jogosAntigos = 0;
        while(jogosAntigos.toFixed(0) != 8192) {
            jogosAntigos = shinyHunt(8192, 1);
            contador ++
        }
            divkk.innerHTML = `${contador}º encontro`;
            divkk.innerHTML += `<br><img src="shining.gif" alt="">`
    }
</script>
