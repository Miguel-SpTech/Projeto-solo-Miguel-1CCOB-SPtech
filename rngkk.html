<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="jackPot()">
        let's go gambling
    </button>
    <button onclick="shinyRGB()">Shiny nos Jogos da 1 até a 5</button>
    <button onclick="zerarContador()">Zerar</button>
    <div id="divkk"></div>
    
</body>
</html>
<script>
    let contador = 0;
    function rng() {
        let numRandom = Math.random() * 9;
        return numRandom
    }
    function jackPot (){
        divkk.innerHTML = "";
        let num1 = rng().toFixed(0);
        let num2 = rng().toFixed(0);
        let num3 = rng().toFixed(0);
        contador ++;

        divkk.innerHTML = `${num1}  ${num2}  ${num3} rolls: ${contador}<br>`;

        if (num1 == num2 && num1 == num3) {
            divkk.innerHTML += `<img src="jackpot.gif" alt="">`;
        }
    }
    function zerarContador(){
        divkk.innerHTML = "";
        contador = 0;
    }
    function shinyHunt(max,min) {
        let shinyChance = Math.random() * (max - min + 1) + min;
        return shinyChance;
    }
    function shinyRGB() {
        
        let jogosAntigos = 0;
        while(jogosAntigos.toFixed(0) != 8192) {
            jogosAntigos = shinyHunt(8192, 1);
            contador ++
        }
            divkk.innerHTML = `${contador}º encontro`;
            divkk.innerHTML += `<br><img src="shining.gif" alt="">`
    }

</script>
